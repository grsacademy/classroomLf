<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>롯데지알에스 아카데미 통합 대시보드</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <style>
        :root {
            --lotte-red: #E60012;
            --bg-light: #F8F9FA;
            --text-main: #1A1A1A;
            --text-sub: #666666;
            --card-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Pretendard', sans-serif; }

        body {
            background-color: #222;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* 전체 컨테이너: 16:9 비율 유지 */
        #dashboard {
            width: 100vw;
            height: 56.25vw;
            max-height: 100vh;
            max-width: 177.78vh;
            background-color: var(--bg-light);
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 100px rgba(0,0,0,0.5);
            position: relative;
        }

        /* --- 상단 헤더 영역 --- */
        header {
            background-color: white;
            height: 110px;
            padding: 0 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #EEE;
            flex-shrink: 0;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            z-index: 10;
        }

        .logo-img {
            height: 35px;
            width: auto;
        }

        .clock-area {
            text-align: right;
        }

        #current-date {
            font-size: 1.1rem;
            color: var(--text-sub);
            font-weight: 600;
            margin-bottom: 2px;
        }

        #current-time {
            font-size: 3rem;
            font-weight: 800;
            color: var(--text-main);
            letter-spacing: -1px;
            line-height: 1;
        }

        /* --- 서브 헤더 (안내 문구 & 필터 버튼) --- */
        .sub-header {
            padding: 35px 60px 10px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            flex-shrink: 0;
        }

        .guide-box h2 {
            font-size: 1.8rem;
            color: var(--lotte-red);
            font-weight: 800;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
        }

        .guide-box p {
            font-size: 1.15rem;
            color: var(--text-sub);
            font-weight: 500;
            letter-spacing: -0.3px;
        }

        .guide-box .highlight {
            color: var(--text-main);
            font-weight: 700;
            background: #FFF2F3;
            padding: 2px 8px;
            border-radius: 6px;
        }

        /* 필터 버튼 영역 */
        .filter-group {
            display: flex;
            gap: 10px;
        }

        .filter-btn {
            padding: 10px 22px;
            border-radius: 25px;
            border: 1px solid #DDD;
            background: white;
            color: var(--text-sub);
            font-size: 1.05rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
        }

        .filter-btn:hover {
            border-color: #BBB;
            color: var(--text-main);
        }

        .filter-btn.active {
            background: var(--lotte-red);
            color: white;
            border-color: var(--lotte-red);
            box-shadow: 0 4px 12px rgba(230, 0, 18, 0.2);
        }

        /* --- 메인 콘텐츠 (과정 카드 그리드) --- */
        .main-content {
            flex: 1;
            padding: 30px 60px 50px;
            overflow-y: auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 30px;
            align-content: start;
        }

        /* --- 인터랙티브 플립(Flip) 카드 스타일 --- */
        .course-card {
            background-color: transparent;
            perspective: 1000px;
            height: 220px;
            cursor: pointer;
            animation: fadeInUp 0.6s ease-out forwards;
            opacity: 0;
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1);
            transform-style: preserve-3d;
            box-shadow: var(--card-shadow);
            border-radius: 25px;
        }

        .course-card.flipped .card-inner {
            transform: rotateY(180deg);
        }

        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 25px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 30px;
            box-sizing: border-box;
        }

        .card-front {
            background-color: white;
            border-top: 6px solid var(--lotte-red);
            color: var(--text-main);
        }

        .card-front .title {
            font-size: 1.8rem;
            font-weight: 800;
            line-height: 1.4;
            word-break: keep-all;
        }
        
        .card-front .click-hint {
            margin-top: 15px;
            font-size: 0.95rem;
            color: var(--lotte-red);
            font-weight: 600;
            background: #FFF2F3;
            padding: 6px 15px;
            border-radius: 20px;
        }

        .card-back {
            background-color: var(--lotte-red);
            color: white;
            transform: rotateY(180deg);
        }

        .card-back .floor {
            font-size: 1.4rem;
            font-weight: 700;
            opacity: 0.9;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        .card-back .room {
            font-size: 2.6rem;
            font-weight: 800;
            word-break: keep-all;
            line-height: 1.2;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .loading-text {
            grid-column: 1 / -1;
            text-align: center;
            font-size: 1.5rem;
            color: var(--text-sub);
            margin-top: 50px;
            font-weight: 600;
        }

        /* --- 하단 모던 인포메이션 푸터 --- */
        footer {
            background-color: #1A1A1A;
            height: 65px;
            display: flex;
            justify-content: center; /* 가운데 정렬로 세련됨 강조 */
            align-items: center;
            flex-shrink: 0;
            border-top: 2px solid var(--lotte-red);
        }

        .contact-capsule {
            display: flex;
            align-items: center;
            gap: 15px;
            background: rgba(255, 255, 255, 0.08);
            padding: 8px 25px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .contact-label {
            font-size: 0.9rem;
            font-weight: 600;
            color: #AAAAAA;
            letter-spacing: 1.5px;
        }

        .contact-divider {
            width: 1px;
            height: 14px;
            background-color: rgba(255, 255, 255, 0.2);
        }

        .contact-number {
            font-size: 1.25rem;
            font-weight: 800;
            color: #FFFFFF;
            letter-spacing: 0.5px;
        }
        
        .contact-number span {
            color: var(--lotte-red);
        }
    </style>
</head>
<body>

<div id="dashboard">
    <!-- 상단 헤더 -->
    <header>
        <div class="logo-area">
            <img src="logo.png" alt="LOTTE GRS" class="logo-img">
        </div>
        <div class="clock-area">
            <div id="current-date">0000. 00. 00 (요일)</div>
            <div id="current-time">00:00</div>
        </div>
    </header>

    <!-- 서브 헤더 -->
    <div class="sub-header">
        <div class="guide-box">
            <h2>오늘의 교육 과정 <span id="total-count" style="font-size:1.1rem; color:#999; margin-left:12px; font-weight:600;">(불러오는 중...)</span></h2>
            <p>아래의 <span class="highlight">과정 박스를 터치</span>하시면 교육이 진행되는 층수와 강의장을 확인하실 수 있습니다.</p>
        </div>
        <!-- 필터 버튼 영역 -->
        <div class="filter-group">
            <button class="filter-btn active" data-filter="all">전체보기</button>
            <button class="filter-btn" data-filter="5F">5F</button>
            <button class="filter-btn" data-filter="6F">6F</button>
            <button class="filter-btn" data-filter="7F">7F</button>
            <button class="filter-btn" data-filter="8F">8F</button>
        </div>
    </div>

    <!-- 메인 그리드 -->
    <main class="main-content" id="courseContainer">
        <div class="loading-text">전체 교육 과정을 동기화 중입니다...</div>
    </main>

    <!-- 세련된 모던 푸터 -->
    <footer>
        <div class="contact-capsule">
            <span class="contact-label">INFORMATION</span>
            <span class="contact-divider"></span>
            <span class="contact-number"><span>📞</span> 02-709-6920</span>
        </div>
    </footer>
</div>

<script>
    const BASE_SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vThSEdRPQ80O2WMC8E-ceES--tvUAIVPlIR4_gmRq2Uoix8CxKqU3WQSkh5O3bKPI4tU56jqMXPKQcn/pub';
    
    const sheets = [
        { floor: '5F', gid: '1841070893' },
        { floor: '6F', gid: '1863328310' },
        { floor: '7F', gid: '0' },
        { floor: '8F', gid: '1181338338' }
    ];

    let globalCourses = [];

    // 시계 동기화 함수
    function updateClock() {
        const now = new Date();
        const y = now.getFullYear();
        const m = String(now.getMonth() + 1).padStart(2, '0');
        const d = String(now.getDate()).padStart(2, '0');
        const week = ['일', '월', '화', '수', '목', '금', '토'][now.getDay()];
        const hh = String(now.getHours()).padStart(2, '0');
        const mm = String(now.getMinutes()).padStart(2, '0');

        document.getElementById('current-date').innerText = `${y}. ${m}. ${d} (${week})`;
        document.getElementById('current-time').innerText = `${hh}:${mm}`;
    }

    // 구글 시트 데이터 로드 함수
    async function fetchAllCourses() {
        try {
            const fetchPromises = sheets.map(async (sheet) => {
                const targetUrl = `${BASE_SHEET_URL}?gid=${sheet.gid}&single=true&output=csv`;
                const response = await fetch(targetUrl);
                const data = await response.text();
                const rows = data.split('\n').slice(1);
                
                return rows.map(row => {
                    const cols = row.split(',');
                    return {
                        title: cols[0]?.trim(),
                        room: cols[2]?.trim(),
                        floor: sheet.floor
                    };
                }).filter(item => item.title && item.title !== ""); 
            });

            const results = await Promise.all(fetchPromises);
            globalCourses = results.flat(); 

            // 총 건수 업데이트
            document.getElementById('total-count').innerText = `(총 ${globalCourses.length}건)`;

            // 현재 눌려진 필터 상태에 맞춰 화면 렌더링
            const activeFilter = document.querySelector('.filter-btn.active').getAttribute('data-filter');
            applyFilter(activeFilter);

        } catch (error) {
            console.error('데이터 로드 오류:', error);
            document.getElementById('courseContainer').innerHTML = `<div class="loading-text" style="color:var(--lotte-red);">데이터를 불러오는 데 실패했습니다. 연결을 확인해주세요.</div>`;
        }
    }

    // 카드 렌더링 함수 (재렌더링 시 자동으로 카드가 앞면으로 복구됨)
    function renderDashboard(courses) {
        const container = document.getElementById('courseContainer');
        
        if (courses.length === 0) {
            container.innerHTML = `<div class="loading-text">해당 조건에 등록된 교육 과정이 없습니다.</div>`;
            return;
        }

        container.innerHTML = courses.map((course, index) => `
            <div class="course-card" style="animation-delay: ${index * 0.05}s" onclick="this.classList.toggle('flipped')">
                <div class="card-inner">
                    <div class="card-front">
                        <h2 class="title">${course.title}</h2>
                        <span class="click-hint">터치하여 강의장 확인 👆</span>
                    </div>
                    <div class="card-back">
                        <div class="floor">${course.floor} FLOOR</div>
                        <div class="room">${course.room || '-'}</div>
                    </div>
                </div>
            </div>
        `).join('');
    }

    // 필터 적용 로직
    function applyFilter(filterValue) {
        if(filterValue === 'all') {
            renderDashboard(globalCourses);
        } else {
            const filtered = globalCourses.filter(c => c.floor === filterValue);
            renderDashboard(filtered);
        }
    }

    // [기능 추가] 20초마다 실행되는 자동 리셋 및 데이터 최신화 함수
    function resetAndFetch() {
        // 1. 필터 버튼을 '전체보기'로 강제 초기화
        const filterBtns = document.querySelectorAll('.filter-btn');
        filterBtns.forEach(b => b.classList.remove('active'));
        document.querySelector('.filter-btn[data-filter="all"]').classList.add('active');

        // 2. 데이터를 다시 불러오면서 렌더링 (이 과정에서 뒤집힌 카드도 앞면으로 리셋됨)
        fetchAllCourses();
    }

    // 필터 버튼 클릭 이벤트 바인딩
    const filterBtns = document.querySelectorAll('.filter-btn');
    filterBtns.forEach(btn => {
        btn.addEventListener('click', (e) => {
            filterBtns.forEach(b => b.classList.remove('active'));
            e.currentTarget.classList.add('active');
            
            const filterValue = e.currentTarget.getAttribute('data-filter');
            applyFilter(filterValue);
        });
    });

    // 시스템 실행 루프 세팅
    updateClock();
    setInterval(updateClock, 1000); // 1초마다 시계 업데이트
    
    // 초기 1회 로드
    fetchAllCourses();
    
    // 20초 주기 자동 리셋 및 데이터 최신화
    setInterval(resetAndFetch, 20000); 
</script>

</body>
</html>
