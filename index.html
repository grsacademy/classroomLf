<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>롯데지알에스 아카데미 통합 대시보드</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <style>
        :root {
            --lotte-red: #E60012;
            --bg-light: #F8F9FA;
            --text-main: #1A1A1A;
            --text-sub: #666666;
            --card-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Pretendard', sans-serif; }

        body {
            background-color: #222;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* 전체 컨테이너: 16:9 비율 유지 */
        #dashboard {
            width: 100vw;
            height: 56.25vw;
            max-height: 100vh;
            max-width: 177.78vh;
            background-color: var(--bg-light);
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 100px rgba(0,0,0,0.5);
            position: relative;
        }

        /* --- 상단 헤더 영역 --- */
        header {
            background-color: white;
            height: 110px;
            padding: 0 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #EEE;
            flex-shrink: 0;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            z-index: 10;
        }

        .logo-img {
            height: 35px;
            width: auto;
        }

        .clock-area {
            text-align: right;
        }

        #current-date {
            font-size: 1.1rem;
            color: var(--text-sub);
            font-weight: 600;
            margin-bottom: 2px;
        }

        #current-time {
            font-size: 3rem;
            font-weight: 800;
            color: var(--text-main);
            letter-spacing: -1px;
            line-height: 1;
        }

        /* --- 서브 헤더 (안내 문구 & 필터 버튼) --- */
        .sub-header {
            padding: 35px 60px 10px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            flex-shrink: 0;
        }

        .guide-box h2 {
            font-size: 1.8rem;
            color: var(--lotte-red);
            font-weight: 800;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
        }

        .guide-box p {
            font-size: 1.15rem;
            color: var(--text-sub);
            font-weight: 500;
            letter-spacing: -0.3px;
        }

        .guide-box .highlight {
            color: var(--text-main);
            font-weight: 700;
            background: #FFF2F3;
            padding: 2px 8px;
            border-radius: 6px;
        }

        /* 필터 버튼 영역 */
        .filter-group {
            display: flex;
            gap: 10px;
        }

        .filter-btn {
            padding: 10px 22px;
            border-radius: 25px;
            border: 1px solid #DDD;
            background: white;
            color: var(--text-sub);
            font-size: 1.05rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
        }

        .filter-btn:hover {
            border-color: #BBB;
            color: var(--text-main);
        }

        .filter-btn.active {
            background: var(--lotte-red);
            color: white;
            border-color: var(--lotte-red);
            box-shadow: 0 4px 12px rgba(230, 0, 18, 0.2);
        }

        /* --- 메인 콘텐츠 (과정 카드 그리드) --- */
        .main-content {
            flex: 1;
            padding: 30px 60px 50px;
            overflow-y: auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 30px;
            align-content: start;
        }

        /* --- 인터랙티브 플립(Flip) 카드 스타일 --- */
        .course-card {
            background-color: transparent;
            perspective: 1000px;
            height: 220px;
            cursor: pointer;
            animation: fadeInUp 0.6s ease-out forwards;
            opacity: 0;
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1);
            transform-style: preserve-3d;
            box-shadow: var(--card-shadow);
            border-radius: 25px;
        }

        .course-card.flipped .card-inner {
            transform: rotateY(180deg);
        }

        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 25px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 30px;
            box-sizing: border-box;
        }

        .card-front {
            background-color: white;
            border-top: 6px solid var(--lotte-red);
            color: var(--text-main);
        }

        .card-front .title {
            font-size: 1.8rem;
            font-weight: 800;
            line-height: 1.4;
            word-break: keep-all;
        }
        
        .card-front .click-hint {
            margin-top: 15px;
            font-size: 0.95rem;
            color: var(--lotte-red);
            font-weight: 600;
            background: #FFF2F3;
            padding: 6px 15px;
            border-radius: 20px;
        }

        .card-back {
            background-color: var(--lotte-red);
            color: white;
            transform: rotateY(180deg);
        }

        .card-back .floor {
            font-size: 1.4rem;
            font-weight: 700;
            opacity: 0.9;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        .card-back .room {
            font-size: 2.6rem;
            font-weight: 800;
            word-break: keep-all;
            line-height: 1.2;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .loading-text {
            grid-column: 1 / -1;
            text-align: center;
            font-size: 1.5rem;
            color: var(--text-sub);
            margin-top: 50px;
            font-weight: 600;
        }

        /* --- 과정이 없을 때(Empty State) & 층별 안내 스타일 --- */
        .empty-state-wrapper {
            grid-column: 1 / -1; 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 10px 0;
            animation: fadeInUp 0.6s ease-out forwards;
        }

        .empty-message {
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--lotte-red);
            background: #FFF2F3;
            padding: 18px 50px;
            border-radius: 35px;
            border: 1px solid rgba(230,0,18,0.1);
            margin-bottom: 40px; 
            box-shadow: 0 4px 15px rgba(230,0,18,0.05);
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .floor-guide-container {
            width: 100%;
            max-width: 1400px;
            background: white;
            border-radius: 30px;
            box-shadow: var(--card-shadow);
            padding: 50px 60px;
        }

        .floor-guide-title {
            font-size: 1.8rem;
            color: var(--text-main);
            font-weight: 800;
            margin-bottom: 40px;
            text-align: center;
            position: relative;
        }
        
        .floor-guide-title::after {
            content: '';
            display: block;
            width: 50px;
            height: 5px;
            background: var(--lotte-red);
            margin: 14px auto 0;
            border-radius: 3px;
        }

        .floor-guide-list {
            list-style: none;
            display: grid;
            grid-template-columns: 1fr 1fr; 
            gap: 25px 40px; 
        }

        .floor-item {
            display: flex;
            align-items: center;
            padding: 24px 35px; 
            background: var(--bg-light);
            border-radius: 22px;
            transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
            border: 1px solid #EBEBEB;
            cursor: pointer; /* 클릭 가능 안내 */
            position: relative;
        }

        .floor-item:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            border-color: var(--lotte-red);
        }

        /* 돋보기 아이콘 추가 */
        .floor-item::after {
            content: '🔍';
            position: absolute;
            right: 30px;
            font-size: 1.5rem;
            opacity: 0.15;
            transition: opacity 0.2s;
        }

        .floor-item:hover::after {
            opacity: 0.8;
        }

        .floor-num {
            font-size: 2.2rem;
            font-weight: 800;
            color: var(--lotte-red);
            width: 90px;
            flex-shrink: 0;
            letter-spacing: -0.5px;
        }

        .floor-desc {
            font-size: 1.35rem; 
            color: var(--text-sub);
            font-weight: 600; 
            line-height: 1.6;
            word-break: keep-all;
            padding-right: 40px; /* 돋보기 아이콘 겹침 방지 */
        }

        /* --- 하단 모던 인포메이션 푸터 --- */
        footer {
            background-color: #FFFFFF;
            height: 65px;
            display: flex;
            justify-content: center; 
            align-items: center;
            flex-shrink: 0;
        }

        .contact-capsule {
            display: flex;
            align-items: center;
            gap: 15px;
            background: rgba(255, 255, 255, 0.08);
            padding: 8px 25px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .contact-label {
			font-size: 0.9rem;
			font-weight: 600;
			color: var(--lotte-red); 
			letter-spacing: 1.5px;
        }

        .contact-divider {
            width: 1px;
            height: 14px;
            background-color: rgba(255, 255, 255, 0.2);
        }

        .contact-number {
            font-size: 1rem;
            font-weight: 700;
            color: #121212;
            letter-spacing: 1.5px;
        }
        
        .contact-number span {
            color: #121212;
        }

        /* --- 도면 이미지 모달 (팝업) 스타일 --- */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0, 0, 0, 0.65);
            display: none; /* 기본 숨김 */
            justify-content: center;
            align-items: center;
            z-index: 9999;
            opacity: 0;
            animation: fadeIn 0.3s forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            background: white;
            padding: 40px 50px;
            border-radius: 30px;
            width: 80%;
            max-width: 1000px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
            position: relative;
            text-align: center;
        }

        .modal-close {
            position: absolute;
            top: 25px; right: 30px;
            font-size: 2.5rem;
            line-height: 1;
            background: none; border: none;
            cursor: pointer; color: #999;
            transition: color 0.2s;
        }

        .modal-close:hover { color: var(--lotte-red); }

        .modal-title {
            font-size: 2.2rem;
            color: var(--lotte-red);
            font-weight: 800;
            margin-bottom: 25px;
        }

        .modal-body img {
            width: 100%;
            height: auto;
            max-height: 60vh;
            object-fit: contain;
            border-radius: 15px;
        }
    </style>
</head>
<body>

<div id="dashboard">
    <header>
        <div class="logo-area">
            <img src="logo.png" alt="LOTTE GRS" class="logo-img">
        </div>
        <div class="clock-area">
            <div id="current-date">0000. 00. 00 (요일)</div>
            <div id="current-time">00:00</div>
        </div>
    </header>

    <div class="sub-header">
        <div class="guide-box">
            <h2>오늘의 교육 과정 <span id="total-count" style="font-size:1.1rem; color:#999; margin-left:12px; font-weight:600;">(불러오는 중...)</span></h2>
            <p>아래의 <span class="highlight">과정 박스를 터치</span>하시면 교육이 진행되는 층수와 강의장을 확인하실 수 있습니다.</p>
        </div>
        <div class="filter-group">
            <button class="filter-btn active" data-filter="all">전체보기</button>
            <button class="filter-btn" data-filter="5F">5F</button>
            <button class="filter-btn" data-filter="6F">6F</button>
            <button class="filter-btn" data-filter="7F">7F</button>
            <button class="filter-btn" data-filter="8F">8F</button>
            <button class="filter-btn" data-filter="9F">9F</button>
        </div>
    </div>

    <main class="main-content" id="courseContainer">
        <div class="loading-text">전체 교육 과정을 동기화 중입니다...</div>
    </main>

    <footer>
        <div class="contact-capsule">
            <span class="contact-label">INFORMATION</span>
            <span class="contact-divider"></span>
            <span class="contact-number"><span> 02-709-6920</span>
        </div>
    </footer>
</div>

<div id="imageModal" class="modal-overlay" onclick="closeModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <button class="modal-close" onclick="closeModal()">&times;</button>
        <h3 class="modal-title" id="modalTitle">층별 교육 시설</h3>
        <div class="modal-body">
            <img id="modalImg" src="" alt="교육시설안내도">
        </div>
    </div>
</div>

<script>
    // 이전에 관리자 앱을 만드셨던 통합 구글 시트의 ID (변동 시 이 부분만 교체)
    const SHEET_ID = '1T6gk3ediGcWimaS5EXVVxHnoqrW2aOdZJ5fGZVYVgLg';
    
    let globalCourses = [];

    // 시계 동기화 함수
    function updateClock() {
        const now = new Date();
        const y = now.getFullYear();
        const m = String(now.getMonth() + 1).padStart(2, '0');
        const d = String(now.getDate()).padStart(2, '0');
        const week = ['일', '월', '화', '수', '목', '금', '토'][now.getDay()];
        const hh = String(now.getHours()).padStart(2, '0');
        const mm = String(now.getMinutes()).padStart(2, '0');

        document.getElementById('current-date').innerText = `${y}. ${m}. ${d} (${week})`;
        document.getElementById('current-time').innerText = `${hh}:${mm}`;
    }

    // 날짜 데이터를 YYYY-MM-DD 형식의 문자열로 안전하게 변환하는 헬퍼 함수
    function parseGvizDate(cell) {
        if (!cell) return '';
        // 1. 이미 포맷된 문자열(f)이 있는 경우 (예: "2026-06-27" 또는 "2026. 06. 27")
        if (cell.f) {
            return String(cell.f).replace(/\./g, '-').replace(/\s/g, '').substring(0, 10);
        }
        // 2. 값(v)이 있는 경우
        if (cell.v) {
            const val = String(cell.v);
            // 구글 Visualization API 특유의 날짜 형식 'Date(2026,5,27)' 인 경우 파싱 (월이 0부터 시작함)
            if (val.startsWith('Date(')) {
                const match = val.match(/Date\((\d+),(\d+),(\d+)/);
                if (match) {
                    const y = match[1];
                    const m = String(parseInt(match[2]) + 1).padStart(2, '0');
                    const d = String(match[3]).padStart(2, '0');
                    return `${y}-${m}-${d}`;
                }
            }
            // 그 외 일반 문자열
            return val.substring(0, 10);
        }
        return '';
    }

    // 구글 시트 통합 데이터 로드 함수 (단일 호출로 변경)
    async function fetchAllCourses() {
        try {
            // Google Visualization API를 활용해 시트를 JSON으로 가져옴
            const targetUrl = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=교육일정`;
            const response = await fetch(targetUrl);
            const text = await response.text();
            
            // 콜백 함수로 감싸진 JSON 데이터를 정규식으로 추출
            const jsonStr = text.match(/google\.visualization\.Query\.setResponse\(([\s\S\w]+)\);/)[1];
            const data = JSON.parse(jsonStr);
            const rows = data.table.rows;

            // 로비에 표시할 기준일(오늘 날짜)을 YYYY-MM-DD 포맷으로 생성
            const now = new Date();
            const y = now.getFullYear();
            const m = String(now.getMonth() + 1).padStart(2, '0');
            const d = String(now.getDate()).padStart(2, '0');
            const todayStr = `${y}-${m}-${d}`;

            globalCourses = [];

            if (rows) {
                rows.forEach(row => {
                    if (!row || !row.c) return;
                    
                    // 각 열의 데이터 가져오기 (인덱스는 시트의 열 A=0, B=1... 기준)
                    // B(1): 과정명, C(2): 시작일, D(3): 종료일, G(6): 층, H(7): 강의장, K(10): 상태
                    const title = row.c[1] ? (row.c[1].v || row.c[1].f) : '';
                    const startDate = parseGvizDate(row.c[2]); 
                    const endDate = parseGvizDate(row.c[3]);
                    const floorRaw = row.c[6] ? (row.c[6].v || row.c[6].f) : '';
                    const room = row.c[7] ? (row.c[7].v || row.c[7].f) : '';
                    const status = row.c[10] ? (row.c[10].v || row.c[10].f) : '';

                    // 관리자 앱에서 입력한 '5층' 등을 로비의 필터 기준인 '5F' 형식으로 변환
                    const floorFormat = String(floorRaw).replace('층', 'F');

                    // ★ 핵심 로직: 상태가 '예약'이며, 오늘(todayStr)이 시작일과 종료일 사이에 있을 때만 화면에 노출
                    if (status === '예약' && startDate <= todayStr && todayStr <= endDate) {
                        globalCourses.push({
                            title: String(title),
                            room: String(room),
                            floor: floorFormat
                        });
                    }
                });
            }

            // 총 건수 업데이트
            document.getElementById('total-count').innerText = `(오늘 총 ${globalCourses.length}건)`;

            // 현재 눌려진 필터 상태에 맞춰 화면 렌더링
            const activeFilter = document.querySelector('.filter-btn.active').getAttribute('data-filter');
            applyFilter(activeFilter);

        } catch (error) {
            console.error('데이터 로드 오류:', error);
            document.getElementById('courseContainer').innerHTML = `<div class="loading-text" style="color:var(--lotte-red);">데이터를 불러오는 데 실패했습니다. 관리자에게 문의해주세요.</div>`;
        }
    }

    // 카드 렌더링 및 층별 안내 화면 로직
    function renderDashboard(courses) {
        const container = document.getElementById('courseContainer');
        
        // 데이터가 없을 때 층별 안내 UI 출력
        if (courses.length === 0) {
            container.innerHTML = `
                <div class="empty-state-wrapper">
                    <div class="empty-message">
                        현재 진행 중인 교육 과정이 없습니다.
                    </div>
                    
                    <div class="floor-guide-container">
                        <h3 class="floor-guide-title">롯데지알에스 아카데미 층별 안내</h3>
                        <ul class="floor-guide-list">
                            
                            <li class="floor-item" onclick="openModal('9')">
                                <span class="floor-num">9F</span>
                                <span class="floor-desc">인재육성팀 사무실, 히스토리뮤지엄, 영상 촬영실</span>
                            </li>
                            <li class="floor-item" onclick="openModal('10')">
                                <span class="floor-num">10F</span>
                                <span class="floor-desc">기숙사, 독서실, 세탁실, 휴게실</span>
                            </li>
                            
                            <li class="floor-item" onclick="openModal('7')">
                                <span class="floor-num">7F</span>
                                <span class="floor-desc">스탠브루 파일럿샵, 플레이팅 조리실습장, 에스프레소룸, 로스팅룸, 베이커리룸</span>
                            </li>
                            <li class="floor-item" onclick="openModal('8')">
                                <span class="floor-num">8F</span>
                                <span class="floor-desc">롯데리아 롤플레잉 실습장, 후라이 스테이션, 그릴 스테이션, 휴게실</span>
                            </li>
                            
                            <li class="floor-item" onclick="openModal('5')">
                                <span class="floor-num">5F</span>
                                <span class="floor-desc">대강의장, 중강의장, 전산실습장, 휴게실, 탈의실</span>
                            </li>
                            <li class="floor-item" onclick="openModal('6')">
                                <span class="floor-num">6F</span>
                                <span class="floor-desc">크리스피크림도넛 실습장, 중강의장, 소강의장, 휴게공간</span>
                            </li>

                        </ul>
                    </div>
                </div>
            `;
            return;
        }

        container.innerHTML = courses.map((course, index) => `
            <div class="course-card" style="animation-delay: ${index * 0.05}s" onclick="this.classList.toggle('flipped')">
                <div class="card-inner">
                    <div class="card-front">
                        <h2 class="title">${course.title}</h2>
                        <span class="click-hint">터치하여 강의장 확인 👆</span>
                    </div>
                   <div class="card-back">
					<div class="floor">${course.floor.replace('F', '')} FLOOR</div>
					<div class="room">${course.room || '-'}</div>
					</div>
                </div>
            </div>
        `).join('');
    }

    // 모달창(팝업) 열기 함수
    function openModal(floorNumber) {
        document.getElementById('modalTitle').innerText = floorNumber + 'F 교육 시설';
        
        const imgEl = document.getElementById('modalImg');
        const imgPath = `floor_${floorNumber}.png`; 
        
        const fallbackSvg = `data:image/svg+xml;charset=UTF-8,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22800%22 height=%22400%22 viewBox=%220 0 800 400%22%3E%3Crect fill=%22%23f9f9f9%22 width=%22800%22 height=%22400%22/%3E%3Ctext fill=%22%23999%22 font-family=%22sans-serif%22 font-size=%2226%22 font-weight=%22bold%22 x=%2250%25%22 y=%2245%25%22 text-anchor=%22middle%22%3E%EC%95%84%EC%A7%81 %EC%9D%B4%EB%AF%B8%EC%A7%80%EA%B0%80 %EC%97%86%EC%8A%B5%EB%8B%88%EB%8B%A4%3C/text%3E%3Ctext fill=%22%23aaa%22 font-family=%22sans-serif%22 font-size=%2218%22 x=%2250%25%22 y=%2258%25%22 text-anchor=%22middle%22%3E(${imgPath} %ED%8C%8C%EC%9D%BC%EC%9D%84 HTML%EA%B3%BC %EA%B0%99%EC%9D%80 %ED%8F%B4%EB%8D%94%EC%97%90 %EB%84%A3%EC%96%B4%EC%A3%BC%EC%84%B8%EC%9A%94)%3C/text%3E%3C/svg%3E`;

        imgEl.onerror = function() {
            this.src = fallbackSvg;
            this.onerror = null; 
        };
        imgEl.src = imgPath;

        document.getElementById('imageModal').style.display = 'flex';
    }

    // 모달창 닫기 함수
    function closeModal() {
        document.getElementById('imageModal').style.display = 'none';
    }

    // 필터 적용 로직
    function applyFilter(filterValue) {
        if(filterValue === 'all') {
            renderDashboard(globalCourses);
        } else {
            const filtered = globalCourses.filter(c => c.floor === filterValue);
            renderDashboard(filtered);
        }
    }

    // 주기적으로 실행되는 자동 리셋 및 데이터 최신화 함수
    function resetAndFetch() {
        const filterBtns = document.querySelectorAll('.filter-btn');
        filterBtns.forEach(b => b.classList.remove('active'));
        document.querySelector('.filter-btn[data-filter="all"]').classList.add('active');

        fetchAllCourses();
    }

    const filterBtns = document.querySelectorAll('.filter-btn');
    filterBtns.forEach(btn => {
        btn.addEventListener('click', (e) => {
            filterBtns.forEach(b => b.classList.remove('active'));
            e.currentTarget.classList.add('active');
            
            const filterValue = e.currentTarget.getAttribute('data-filter');
            applyFilter(filterValue);
        });
    });

    // 시작 시 즉시 실행 및 인터벌 설정
    updateClock();
    setInterval(updateClock, 1000); 
    
    fetchAllCourses();
    setInterval(resetAndFetch, 60000); // 1분(60초) 단위로 데이터 최신화
</script>

</body>
</html>
