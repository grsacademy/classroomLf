<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>롯데지알에스 아카데미 통합 대시보드</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <style>
        :root {
            --lotte-red: #E60012;
            --bg-light: #F8F9FA;
            --text-main: #1A1A1A;
            --text-sub: #666666;
            --card-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Pretendard', sans-serif; }

        body {
            background-color: #222;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* 전체 컨테이너: 16:9 비율 유지 */
        #dashboard {
            width: 100vw;
            height: 56.25vw;
            max-height: 100vh;
            max-width: 177.78vh;
            background-color: var(--bg-light);
            display: flex;
            flex-direction: column; /* 세로 배치 (헤더 + 메인 컨텐츠) */
            box-shadow: 0 0 100px rgba(0,0,0,0.5);
            position: relative;
        }

        /* --- 상단 헤더 영역 --- */
        header {
            background-color: white;
            height: 120px;
            padding: 0 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #EEE;
            flex-shrink: 0;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            z-index: 10;
        }

        .logo-img {
            height: 35px;
            width: auto;
        }

        .clock-area {
            text-align: right;
        }

        #current-date {
            font-size: 1.1rem;
            color: var(--text-sub);
            font-weight: 600;
            margin-bottom: 2px;
        }

        #current-time {
            font-size: 3rem;
            font-weight: 800;
            color: var(--text-main);
            letter-spacing: -1px;
            line-height: 1;
        }

        /* --- 메인 콘텐츠 (과정 카드 그리드) --- */
        .main-content {
            flex: 1;
            padding: 50px 60px;
            overflow-y: auto; /* 과정이 많을 경우 스크롤 허용 */
            display: grid;
            /* 화면 크기에 맞춰 카드가 자동 배열되도록 설정 */
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 30px;
            align-content: start;
        }

        /* --- 인터랙티브 플립(Flip) 카드 스타일 --- */
        .course-card {
            background-color: transparent;
            perspective: 1000px; /* 3D 효과 원근감 부여 */
            height: 220px;
            cursor: pointer;
            animation: fadeInUp 0.6s ease-out forwards;
            opacity: 0;
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1);
            transform-style: preserve-3d;
            box-shadow: var(--card-shadow);
            border-radius: 25px;
        }

        /* 카드가 클릭(flipped 클래스 추가)되었을 때 뒤집어짐 */
        .course-card.flipped .card-inner {
            transform: rotateY(180deg);
        }

        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden; /* 뒷면 숨김 처리 */
            border-radius: 25px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 30px;
            box-sizing: border-box;
        }

        /* 카드 앞면 (과정명) */
        .card-front {
            background-color: white;
            border-top: 6px solid var(--lotte-red);
            color: var(--text-main);
        }

        .card-front .title {
            font-size: 1.8rem;
            font-weight: 800;
            line-height: 1.4;
            word-break: keep-all;
        }
        
        .card-front .click-hint {
            margin-top: 15px;
            font-size: 0.95rem;
            color: var(--lotte-red);
            font-weight: 600;
            background: #FFF2F3;
            padding: 6px 15px;
            border-radius: 20px;
        }

        /* 카드 뒷면 (층수 & 강의장) */
        .card-back {
            background-color: var(--lotte-red);
            color: white;
            transform: rotateY(180deg);
        }

        .card-back .floor {
            font-size: 1.4rem;
            font-weight: 700;
            opacity: 0.9;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        .card-back .room {
            font-size: 2.6rem;
            font-weight: 800;
            word-break: keep-all;
            line-height: 1.2;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 로딩 텍스트 */
        .loading-text {
            grid-column: 1 / -1;
            text-align: center;
            font-size: 1.5rem;
            color: var(--text-sub);
            margin-top: 50px;
            font-weight: 600;
        }
    </style>
</head>
<body>

<div id="dashboard">
    <header>
        <div class="logo-area">
            <img src="logo.png" alt="LOTTE GRS" class="logo-img">
        </div>
        <div class="clock-area">
            <div id="current-date">0000. 00. 00 (요일)</div>
            <div id="current-time">00:00</div>
        </div>
    </header>

    <main class="main-content" id="courseContainer">
        <div class="loading-text">전체 교육 과정을 불러오는 중입니다...</div>
    </main>
</div>

<script>
    const BASE_SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vThSEdRPQ80O2WMC8E-ceES--tvUAIVPlIR4_gmRq2Uoix8CxKqU3WQSkh5O3bKPI4tU56jqMXPKQcn/pub';
    
    // 💡 전체 층 데이터를 한 번에 수집하기 위한 배열 (이전 코드에서 제공해주신 gid 기준)
    const sheets = [
        { floor: '5F', gid: '1841070893' },
        { floor: '6F', gid: '1863328310' },
        { floor: '7F', gid: '0' },
        { floor: '8F', gid: '1181338338' }
    ];

    // 실시간 시계 시스템
    function updateClock() {
        const now = new Date();
        const y = now.getFullYear();
        const m = String(now.getMonth() + 1).padStart(2, '0');
        const d = String(now.getDate()).padStart(2, '0');
        const week = ['일', '월', '화', '수', '목', '금', '토'][now.getDay()];
        const hh = String(now.getHours()).padStart(2, '0');
        const mm = String(now.getMinutes()).padStart(2, '0');

        document.getElementById('current-date').innerText = `${y}. ${m}. ${d} (${week})`;
        document.getElementById('current-time').innerText = `${hh}:${mm}`;
    }

    // 4개 층의 구글 시트 데이터를 동시에 불러와 합치는 함수
    async function fetchAllCourses() {
        try {
            // Promise.all을 사용하여 4개의 시트를 동시에 병렬로 로드 (속도 향상)
            const fetchPromises = sheets.map(async (sheet) => {
                const targetUrl = `${BASE_SHEET_URL}?gid=${sheet.gid}&single=true&output=csv`;
                const response = await fetch(targetUrl);
                const data = await response.text();
                const rows = data.split('\n').slice(1);
                
                // 각 층별 CSV 파싱 (비어있는 행 제외)
                return rows.map(row => {
                    const cols = row.split(',');
                    return {
                        title: cols[0]?.trim(),
                        room: cols[2]?.trim(),
                        floor: sheet.floor // 데이터에 소속 층수 라벨링
                    };
                }).filter(item => item.title && item.title !== ""); // 과정명이 있는 데이터만 필터링
            });

            // 4개 층의 결과를 하나로 통합
            const results = await Promise.all(fetchPromises);
            const allCourses = results.flat(); 

            renderDashboard(allCourses);
        } catch (error) {
            console.error('데이터 로드 오류:', error);
            document.getElementById('courseContainer').innerHTML = `<div class="loading-text" style="color:var(--lotte-red);">데이터를 불러오는 데 실패했습니다. 연결을 확인해주세요.</div>`;
        }
    }

    // 카드를 화면에 렌더링하는 함수
    function renderDashboard(courses) {
        const container = document.getElementById('courseContainer');
        
        if (courses.length === 0) {
            container.innerHTML = `<div class="loading-text">현재 등록된 교육 과정이 없습니다.</div>`;
            return;
        }

        // HTML 문자열로 카드 리스트 생성
        container.innerHTML = courses.map((course, index) => `
            <div class="course-card" style="animation-delay: ${index * 0.05}s" onclick="this.classList.toggle('flipped')">
                <div class="card-inner">
                    <div class="card-front">
                        <h2 class="title">${course.title}</h2>
                        <span class="click-hint">터치하여 강의장 확인 👆</span>
                    </div>
                    <div class="card-back">
                        <div class="floor">${course.floor} FLOOR</div>
                        <div class="room">${course.room || '-'}</div>
                    </div>
                </div>
            </div>
        `).join('');
    }

    // 시스템 실행 및 타이머
    updateClock();
    setInterval(updateClock, 1000); // 1초 단위 시계 갱신
    
    fetchAllCourses();
    setInterval(fetchAllCourses, 60000); // 1분 단위 구글시트 자동 새로고침
</script>

</body>
</html>
