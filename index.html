<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>롯데지알에스 아카데미 통합 대시보드</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <style>
        :root {
            --lotte-red: #E60012;
            --bg-light: #F8F9FA;
            --text-main: #1A1A1A;
            --text-sub: #666666;
            --card-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Pretendard', sans-serif; }

        body {
            background-color: #222;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* 전체 컨테이너: 16:9 비율 유지 */
        #dashboard {
            width: 100vw;
            height: 56.25vw;
            max-height: 100vh;
            max-width: 177.78vh;
            background-color: var(--bg-light);
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 100px rgba(0,0,0,0.5);
            position: relative;
        }

        /* --- 상단 헤더 영역 --- */
        header {
            background-color: white;
            height: 110px;
            padding: 0 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #EEE;
            flex-shrink: 0;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            z-index: 10;
        }

        .logo-img {
            height: 35px;
            width: auto;
        }

        .clock-area {
            text-align: right;
        }

        #current-date {
            font-size: 1.1rem;
            color: var(--text-sub);
            font-weight: 600;
            margin-bottom: 2px;
        }

        #current-time {
            font-size: 3rem;
            font-weight: 800;
            color: var(--text-main);
            letter-spacing: -1px;
            line-height: 1;
        }

        /* --- 서브 헤더 (안내 문구 & 필터 버튼) --- */
        .sub-header {
            padding: 35px 60px 10px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            flex-shrink: 0;
        }

        .guide-box h2 {
            font-size: 1.8rem;
            color: var(--lotte-red);
            font-weight: 800;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
        }

        .guide-box p {
            font-size: 1.15rem;
            color: var(--text-sub);
            font-weight: 500;
            letter-spacing: -0.3px;
        }

        .guide-box .highlight {
            color: var(--text-main);
            font-weight: 700;
            background: #FFF2F3;
            padding: 2px 8px;
            border-radius: 6px;
        }

        /* 필터 버튼 영역 */
        .filter-group {
            display: flex;
            gap: 10px;
        }

        .filter-btn {
            padding: 10px 22px;
            border-radius: 25px;
            border: 1px solid #DDD;
            background: white;
            color: var(--text-sub);
            font-size: 1.05rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
        }

        .filter-btn:hover {
            border-color: #BBB;
            color: var(--text-main);
        }

        .filter-btn.active {
            background: var(--lotte-red);
            color: white;
            border-color: var(--lotte-red);
            box-shadow: 0 4px 12px rgba(230, 0, 18, 0.2);
        }

        /* --- 메인 콘텐츠 (과정 카드 그리드) --- */
        .main-content {
            flex: 1;
            padding: 30px 60px 50px;
            overflow-y: auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 30px;
            align-content: start;
        }

        /* --- 인터랙티브 플립(Flip) 카드 스타일 --- */
        .course-card {
            background-color: transparent;
            perspective: 1000px;
            height: 220px;
            cursor: pointer;
            animation: fadeInUp 0.6s ease-out forwards;
            opacity: 0;
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1);
